      :root {

        :root {

          --muted: #a1a1aa;
          --card: #0f172a;
          --border: #263244;

        }
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        line-height: 1.6;
      }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }
      header {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 14px;
        padding: 18px 18px 14px;
        margin-bottom: 20px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .lang {
        display: inline-flex;
        gap: 8px;
      }
      .btn {
        appearance: none;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg);
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        line-height: 1;
        cursor: pointer;
      }
      .btn[aria-pressed="true"] {
        background: color-mix(in srgb, var(--card) 90%, transparent);
        border-color: color-mix(in srgb, var(--border) 60%, var(--fg));
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
        line-height: 1.25;
        letter-spacing: -0.01em;
      }
      .meta {
        margin: 0;
        color: var(--muted);
      }
      .meta strong {
        color: var(--fg);
        font-weight: 600;
      }
      .placeholder {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        padding: 0.1em 0.35em;
        border-radius: 6px;
        border: 1px dashed var(--border);
        background: color-mix(in srgb, var(--card) 85%, transparent);
        white-space: nowrap;
      }
      ol {
        margin: 0;
        padding-left: 1.15rem;
      }
      li {
        margin: 0;
        padding: 0.35rem 0;
      }
      li > h2 {
        margin: 0.25rem 0 0.35rem;
        font-size: 1.05rem;
        line-height: 1.35;
      }
      p {
        margin: 0.4rem 0;
      }
      ul {
        margin: 0.35rem 0 0.15rem;
        padding-left: 1.1rem;
      }
      a {
        color: var(--link);
      }
      footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>

        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved === "th" || saved === "en") return saved;
        const langs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language]).filter(Boolean);
        const primary = String(langs[0] || "").toLowerCase();
        return primary.startsWith("th") ? "th" : "en";
      }

      function setPressed(lang) {
        document.getElementById("lang-th").setAttribute("aria-pressed", String(lang === "th"));
        document.getElementById("lang-en").setAttribute("aria-pressed", String(lang === "en"));
      }

      function render(lang) {
        const s = STRINGS[lang];
        document.documentElement.lang = lang;
        document.title = lang === "th" ? "ข้อกำหนดและเงื่อนไขการใช้งาน – BuddyHealth" : "Terms & Conditions – BuddyHealth";
        document.getElementById("ui-subtitle").textContent = s.uiSubtitle;
        document.getElementById("doc-title").textContent = s.title;
        document.getElementById("meta-effective").innerHTML = s.metaEffective;
        document.getElementById("meta-provider").innerHTML = s.metaProvider;
        document.getElementById("meta-contact").innerHTML = s.metaContact;
        document.getElementById("footer-note").innerHTML = s.footerNote;

        const ol = document.getElementById("terms");
        ol.textContent = "";
        for (const sec of s.sections) {
          const li = document.createElement("li");
          const h2 = document.createElement("h2");
          h2.textContent = sec.h;
          li.appendChild(h2);

          for (const para of sec.p || []) {
            const p = document.createElement("p");
            p.innerHTML = para;
            li.appendChild(p);
          }

          if (sec.ul && sec.ul.length) {
            const ul = document.createElement("ul");
            for (const item of sec.ul) {
              const li2 = document.createElement("li");
              li2.innerHTML = item;
              ul.appendChild(li2);
            }
            li.appendChild(ul);
          }
          ol.appendChild(li);
        }

        setPressed(lang);
      }

      function setLang(lang) {
        localStorage.setItem(STORAGE_KEY, lang);
        render(lang);
      }

      document.getElementById("lang-th").addEventListener("click", () => setLang("th"));
      document.getElementById("lang-en").addEventListener("click", () => setLang("en"));

      render(detectLang());
    </script>
  </body>
</html>
